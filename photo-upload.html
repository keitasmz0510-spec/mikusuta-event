<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📸 写真を送る | MIXTAR NIGHT 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #e8e0d0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at top, #1a2040 0%, #0a0e1a 60%);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-top: 10px;
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #a0b4d0;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f0e8d0;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #8090a8;
      line-height: 1.6;
    }

    .upload-area {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(100,160,220,0.4);
      border-radius: 20px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .upload-area:hover, .upload-area.drag-over {
      border-color: rgba(100,160,220,0.8);
      background: rgba(100,160,220,0.1);
    }

    .upload-icon { font-size: 48px; margin-bottom: 16px; }
    .upload-text { font-size: 16px; color: #c0d0e0; margin-bottom: 8px; }
    .upload-hint { font-size: 12px; color: #607080; }

    #fileInput { display: none; }

    .preview-container {
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
      display: none;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
    }

    .preview-item img { width: 100%; height: 100%; object-fit: cover; }

    .preview-item .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name-input-area {
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }

    .name-input-area label {
      display: block;
      font-size: 13px;
      color: #8090a8;
      margin-bottom: 8px;
    }

    .name-input-area input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e0d0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }

    .name-input-area input:focus { border-color: rgba(100,160,220,0.6); }
    .name-input-area input::placeholder { color: #506070; }

    .submit-btn {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(135deg, #2a5080, #1a3060);
      border: 1px solid rgba(100,160,220,0.4);
      border-radius: 14px;
      padding: 16px;
      color: #c0d8f0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .submit-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #3a6090, #2a4070);
      box-shadow: 0 4px 20px rgba(100,160,220,0.3);
    }

    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .progress-bar {
      width: 100%;
      max-width: 400px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
      display: none;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4080c0, #60a0e0);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .status-message {
      text-align: center;
      font-size: 14px;
      color: #8090a8;
      margin-bottom: 16px;
      min-height: 20px;
    }

    .size-warning {
      width: 100%;
      max-width: 400px;
      background: rgba(255,180,50,0.1);
      border: 1px solid rgba(255,180,50,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #c0a050;
      margin-bottom: 16px;
      display: none;
    }

    .success-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .success-icon { font-size: 64px; margin-bottom: 20px; }
    .success-title { font-size: 24px; font-weight: 700; color: #f0e8d0; margin-bottom: 12px; }
    .success-subtitle { font-size: 14px; color: #8090a8; line-height: 1.8; }

    .another-btn {
      margin-top: 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 24px;
      color: #c0d0e0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .another-btn:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge">🌙 MIXTAR NIGHT 2026.5.9</div>
    <h1>📸 写真を送る</h1>
    <p class="subtitle">撮った写真をスクリーンに映そう！<br>ブラウザから直接アップロードできます</p>
  </div>

  <div id="mainContent" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📷</div>
      <div class="upload-text">タップして写真を選ぶ</div>
      <div class="upload-hint">複数枚まとめて選択もOK（最大3枚）</div>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <div class="preview-container" id="previewContainer">
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="size-warning" id="sizeWarning">
      ⚠️ 写真が大きいため圧縮中です。少々お待ちください。
    </div>

    <div class="name-input-area">
      <label>あなたのキャラ・ニックネーム（任意）</label>
      <input type="text" id="nameInput" placeholder="例：🦅タカ型のケイタ" maxlength="20">
    </div>

    <button class="submit-btn" id="submitBtn" disabled>
      📤 スクリーンに送る！
    </button>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="status-message" id="statusMessage"></div>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">🎉</div>
    <div class="success-title">送信完了！</div>
    <div class="success-subtitle">
      写真がスクリーンに映るよ👀<br>
      みんなで楽しもう🥂<br><br>
      <span style="color: #6080a0;">MIXTAR NIGHT 2026.5.9</span>
    </div>
    <button class="another-btn" id="anotherBtn">もう1枚送る</button>
  </div>

  <!-- Firebase SDK (Realtime DBのみ) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // ============================================================
    // Firebase設定（設定済み）
    // ============================================================
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAHubbfHAewDWar-XxuL3q_n-hZZs4_uTs",
      authDomain: "mikusuta-night-2026.firebaseapp.com",
      databaseURL: "https://mikusuta-night-2026-default-rtdb.firebaseio.com",
      projectId: "mikusuta-night-2026",
      storageBucket: "mikusuta-night-2026.firebasestorage.app",
      messagingSenderId: "618005165983",
      appId: "1:618005165983:web:0a36dcf44ca19838baafaa"
    };
    // ============================================================

    const app = initializeApp(FIREBASE_CONFIG);
    const database = getDatabase(app);

    let selectedFiles = [];

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewGrid = document.getElementById('previewGrid');
    const submitBtn = document.getElementById('submitBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const statusMessage = document.getElementById('statusMessage');
    const successScreen = document.getElementById('successScreen');
    const mainContent = document.getElementById('mainContent');
    const anotherBtn = document.getElementById('anotherBtn');

    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      handleFiles(Array.from(e.target.files));
    });

    function handleFiles(files) {
      selectedFiles = [...selectedFiles, ...files].slice(0, 3); // 最大3枚
      updatePreview();
    }

    function updatePreview() {
      if (selectedFiles.length === 0) {
        previewContainer.style.display = 'none';
        submitBtn.disabled = true;
        return;
      }
      previewContainer.style.display = 'block';
      submitBtn.disabled = false;
      previewGrid.innerHTML = '';

      selectedFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML = `
            <img src="${e.target.result}" alt="preview">
            <button class="remove-btn" data-index="${index}">✕</button>
          `;
          item.querySelector('.remove-btn').addEventListener('click', () => {
            selectedFiles.splice(index, 1);
            updatePreview();
          });
          previewGrid.appendChild(item);
        };
        reader.readAsDataURL(file);
      });
    }

    // 画像をリサイズしてBase64に変換（小さめに圧縮）
    function resizeToBase64(file, maxWidth = 600, quality = 0.6) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    submitBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      const nickname = document.getElementById('nameInput').value.trim() || '匿名';
      submitBtn.disabled = true;
      progressBar.style.display = 'block';
      statusMessage.textContent = '写真を圧縮中...';

      try {
        const base64Images = [];
        for (let i = 0; i < selectedFiles.length; i++) {
          progressFill.style.width = ((i / selectedFiles.length) * 60) + '%';
          const b64 = await resizeToBase64(selectedFiles[i]);
          base64Images.push(b64);
        }

        statusMessage.textContent = '送信中...';
        progressFill.style.width = '80%';

        await push(ref(database, 'photos'), {
          images: base64Images,
          nickname: nickname,
          timestamp: serverTimestamp(),
          count: base64Images.length
        });

        progressFill.style.width = '100%';

        setTimeout(() => {
          mainContent.style.display = 'none';
          successScreen.style.display = 'block';
        }, 400);

      } catch (err) {
        statusMessage.textContent = '❌ エラーが発生しました。もう一度お試しください。';
        console.error(err);
        submitBtn.disabled = false;
      }
    });

    anotherBtn.addEventListener('click', () => {
      selectedFiles = [];
      updatePreview();
      document.getElementById('nameInput').value = '';
      progressFill.style.width = '0%';
      progressBar.style.display = 'none';
      statusMessage.textContent = '';
      successScreen.style.display = 'none';
      mainContent.style.display = 'flex';
    });
  </script>
</body>
</html>
