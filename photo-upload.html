<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写真を送る | MIXTAR NIGHT 2026</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0e1a;
  color: #e8e0d0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
  background-image: radial-gradient(ellipse at top, #1a2040 0%, #0a0e1a 60%);
}
.badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 16px;
  font-size: 11px;
  letter-spacing: 2px;
  color: #a0b4d0;
  margin-bottom: 14px;
}
h1 { font-size: 26px; font-weight: 700; color: #f0e8d0; margin-bottom: 6px; text-align: center; }
.sub { font-size: 13px; color: #8090a8; line-height: 1.6; text-align: center; margin-bottom: 24px; }
.upload-area {
  width: 100%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  border: 2px dashed rgba(100,160,220,0.4);
  border-radius: 20px;
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 16px;
}
.upload-area:hover { border-color: rgba(100,160,220,0.8); background: rgba(100,160,220,0.08); }
.upload-icon { font-size: 44px; margin-bottom: 12px; }
.upload-text { font-size: 16px; color: #c0d0e0; margin-bottom: 6px; }
.upload-hint { font-size: 12px; color: #607080; }
#fileInput { display: none; }
.preview-wrap { width: 100%; max-width: 400px; margin-bottom: 16px; display: none; }
.preview-img { width: 100%; border-radius: 12px; object-fit: cover; max-height: 240px; }
.field-wrap { width: 100%; max-width: 400px; margin-bottom: 14px; }
.field-wrap label { display: block; font-size: 13px; color: #8090a8; margin-bottom: 6px; }
.field-wrap input,
.field-wrap textarea {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 12px 16px;
  color: #e8e0d0;
  font-size: 16px;
  outline: none;
  font-family: inherit;
  resize: none;
}
.field-wrap input::placeholder,
.field-wrap textarea::placeholder { color: #506070; }
.field-wrap textarea { height: 80px; line-height: 1.5; }
.char-count { font-size: 11px; color: #506070; text-align: right; margin-top: 4px; }
.send-btn {
  width: 100%;
  max-width: 400px;
  background: linear-gradient(135deg, #2a5080, #1a3060);
  border: 1px solid rgba(100,160,220,0.4);
  border-radius: 14px;
  padding: 16px;
  color: #c0d8f0;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 14px;
}
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn:not(:disabled):hover { background: linear-gradient(135deg, #3a6090, #2a4070); }
.status { font-size: 14px; color: #8090a8; text-align: center; min-height: 20px; margin-bottom: 8px; }
.bar-wrap { width: 100%; max-width: 400px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 16px; display: none; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #4080c0, #60a0e0); border-radius: 3px; transition: width 0.4s; width: 0%; }
.done-screen { display: none; text-align: center; padding: 40px 20px; }
.done-icon { font-size: 64px; margin-bottom: 20px; }
.done-title { font-size: 24px; font-weight: 700; color: #f0e8d0; margin-bottom: 10px; }
.done-sub { font-size: 14px; color: #8090a8; line-height: 1.8; }
.again-btn {
  margin-top: 24px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 12px 24px;
  color: #c0d0e0;
  font-size: 14px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="main" style="width:100%;display:flex;flex-direction:column;align-items:center;">
  <div class="badge">🌙 MIXTAR NIGHT 2026.5.9</div>
  <h1>📸 写真を送る</h1>
  <p class="sub">撮った写真をスクリーンに映そう！<br>ブラウザから直接アップロードできます</p>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">📷</div>
    <div class="upload-text">タップして写真を選ぶ</div>
    <div class="upload-hint">1枚ずつ選んで送ってね</div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img class="preview-img" id="previewImg" src="" alt="プレビュー">
  </div>

  <div class="field-wrap">
    <label>あなたのキャラ・ニックネーム（任意）</label>
    <input type="text" id="nameInput" placeholder="例：🦅タカ型のケイタ" maxlength="20">
  </div>

  <div class="field-wrap">
    <label>一言コメント（任意）</label>
    <textarea id="commentInput" placeholder="例：最高の夜！また来年も🥂" maxlength="50"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 50文字</div>
  </div>

  <button class="send-btn" id="sendBtn" disabled>📤 スクリーンに送る！</button>

  <div class="bar-wrap" id="barWrap"><div class="bar-fill" id="barFill"></div></div>
  <div class="status" id="status"></div>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-icon">🎉</div>
  <div class="done-title">送信完了！</div>
  <div class="done-sub">写真がスクリーンに映るよ👀<br>みんなで楽しもう🥂<br><br><span style="color:#6080a0;">MIXTAR NIGHT 2026.5.9</span></div>
  <button class="again-btn" id="againBtn">もう1枚送る</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const config = {
  apiKey: "AIzaSyAHubbfHAewDWar-XxuL3q_n-hZZs4_uTs",
  authDomain: "mikusuta-night-2026.firebaseapp.com",
  databaseURL: "https://mikusuta-night-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mikusuta-night-2026",
  storageBucket: "mikusuta-night-2026.firebasestorage.app",
  messagingSenderId: "618005165983",
  appId: "1:618005165983:web:0a36dcf44ca19838baafaa"
};

const app = initializeApp(config);
const db = getDatabase(app);

let selectedFile = null;

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('previewImg');
const sendBtn = document.getElementById('sendBtn');
const barWrap = document.getElementById('barWrap');
const barFill = document.getElementById('barFill');
const status = document.getElementById('status');
const main = document.getElementById('main');
const doneScreen = document.getElementById('doneScreen');
const againBtn = document.getElementById('againBtn');
const commentInput = document.getElementById('commentInput');
const charCount = document.getElementById('charCount');

uploadArea.addEventListener('click', () => fileInput.click());

commentInput.addEventListener('input', () => {
  charCount.textContent = commentInput.value.length;
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    previewImg.src = ev.target.result;
    previewWrap.style.display = 'block';
    sendBtn.disabled = false;
  };
  reader.readAsDataURL(file);
});

function compress(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const MAX = 480;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
        else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.5));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

sendBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  sendBtn.disabled = true;
  barWrap.style.display = 'block';
  barFill.style.width = '20%';
  status.textContent = '写真を圧縮中...';

  try {
    const b64 = await compress(selectedFile);
    barFill.style.width = '60%';
    status.textContent = '送信中...';

    const nickname = document.getElementById('nameInput').value.trim() || '匿名';
    const comment = commentInput.value.trim();
    await push(ref(db, 'photos'), {
      image: b64,
      nickname: nickname,
      comment: comment,
      timestamp: serverTimestamp()
    });

    barFill.style.width = '100%';
    status.textContent = '';
    setTimeout(() => {
      main.style.display = 'none';
      doneScreen.style.display = 'block';
    }, 300);

  } catch (err) {
    status.textContent = '❌ エラー: ' + err.message;
    sendBtn.disabled = false;
    barFill.style.width = '0%';
  }
});

againBtn.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  previewWrap.style.display = 'none';
  previewImg.src = '';
  document.getElementById('nameInput').value = '';
  commentInput.value = '';
  charCount.textContent = '0';
  barFill.style.width = '0%';
  barWrap.style.display = 'none';
  status.textContent = '';
  sendBtn.disabled = true;
  doneScreen.style.display = 'none';
  main.style.display = 'flex';
  main.style.flexDirection = 'column';
  main.style.alignItems = 'center';
});
</script>
</body>
</html>
