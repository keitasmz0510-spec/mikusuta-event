<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXTAR NIGHT 2026 - ライブフォト</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060810;
  color: #e8e0d0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
  z-index: 10;
}
.live { background: #c03030; color: white; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 3px 10px; border-radius: 4px; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.title { font-size: 15px; font-weight: 600; color: #c0d0e0; letter-spacing: 1px; margin-left: 12px; }
.count { font-size: 13px; color: #607080; }
.btns button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 5px 12px;
  color: #c0d0e0;
  font-size: 12px;
  cursor: pointer;
  margin-left: 6px;
  transition: all 0.2s;
}
.btns button:hover { background: rgba(255,255,255,0.15); }
.btns button.on { background: rgba(100,160,220,0.2); border-color: rgba(100,160,220,0.5); color: #80c0f0; }
.main { flex: 1; position: relative; overflow: hidden; }

/* 待機 */
.wait {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1a2040 0%, #060810 70%);
}
.wait-icon { font-size: 80px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.wait-title { font-size: 28px; font-weight: 700; color: #c0d0e0; margin-bottom: 12px; }
.wait-sub { font-size: 16px; color: #607080; text-align: center; line-height: 1.8; }

/* ウォール */
.wall {
  width: 100%; height: 100%;
  padding: 10px;
  overflow: hidden;
  display: none;
}
.wall.on {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  grid-auto-rows: 180px;
  gap: 8px;
  align-content: start;
}
.wall-item {
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  background: rgba(255,255,255,0.05);
  animation: pop 0.6s ease;
}
@keyframes pop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
.wall-item img { width: 100%; height: 100%; object-fit: cover; }
.wall-item .name {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  padding: 20px 8px 6px;
  font-size: 11px; color: rgba(255,255,255,0.85);
}

/* スライドショー */
.slides { width: 100%; height: 100%; display: none; position: relative; }
.slides.on { display: block; }
.slide-img {
  width: 100%; height: 100%; object-fit: contain;
  position: absolute; top: 0; left: 0;
  opacity: 0; transition: opacity 1s ease;
}
.slide-img.show { opacity: 1; }
.slide-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  padding: 40px 30px 20px; z-index: 5;
}
.slide-name { font-size: 18px; color: rgba(255,255,255,0.9); font-weight: 500; }
.slide-time { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* トースト */
.toast {
  position: fixed; top: 60px; right: 20px;
  background: rgba(40,80,120,0.95);
  border: 1px solid rgba(100,160,220,0.5);
  border-radius: 12px; padding: 10px 18px;
  font-size: 14px; color: #c0e0ff; z-index: 100;
  transform: translateX(200%); transition: transform 0.4s ease;
}
.toast.show { transform: translateX(0); }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="live">● LIVE</div>
    <div class="title">🌙 MIXTAR NIGHT 2026 — みんなの写真</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="count" id="count">0枚</div>
    <div class="btns">
      <button id="wallBtn" class="on" onclick="setMode('wall')">🖼 ウォール</button>
      <button id="slideBtn" onclick="setMode('slide')">▶ スライドショー</button>
      <button id="pauseBtn" onclick="togglePause()">⏸ 一時停止</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="wait" id="wait">
    <div class="wait-icon">📸</div>
    <div class="wait-title">写真を待っています…</div>
    <div class="wait-sub">参加者がアップロードすると<br>ここに自動で表示されます</div>
  </div>
  <div class="wall" id="wall"></div>
  <div class="slides" id="slides">
    <img class="slide-img" id="img1" src="" alt="">
    <img class="slide-img" id="img2" src="" alt="">
    <div class="slide-info">
      <div class="slide-name" id="slideName"></div>
      <div class="slide-time" id="slideTime"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onChildAdded, query, orderByChild } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const config = {
  apiKey: "AIzaSyAHubbfHAewDWar-XxuL3q_n-hZZs4_uTs",
  authDomain: "mikusuta-night-2026.firebaseapp.com",
  databaseURL: "https://mikusuta-night-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mikusuta-night-2026",
  storageBucket: "mikusuta-night-2026.firebasestorage.app",
  messagingSenderId: "618005165983",
  appId: "1:618005165983:web:0a36dcf44ca19838baafaa"
};

const app = initializeApp(config);
const db = getDatabase(app);

let photos = [];
let mode = 'wall';
let paused = false;
let slideIdx = 0;
let timer = null;
let cur = 1;

const wait = document.getElementById('wait');
const wall = document.getElementById('wall');
const slides = document.getElementById('slides');
const countEl = document.getElementById('count');
const toast = document.getElementById('toast');

onChildAdded(query(ref(db, 'photos'), orderByChild('timestamp')), (snap) => {
  const d = snap.val();
  if (!d || !d.image) return;
  photos.push({ src: d.image, name: d.nickname || '匿名', ts: d.timestamp });
  countEl.textContent = photos.length + '枚';
  showToast('📸 ' + (d.nickname || '匿名') + 'さんが写真を送りました！');
  if (photos.length === 1) {
    wait.style.display = 'none';
    setMode(mode);
  } else if (mode === 'wall') {
    addWallItem(photos[photos.length - 1]);
  }
});

function addWallItem(p) {
  if (!wall.classList.contains('on')) return;
  const el = document.createElement('div');
  el.className = 'wall-item';
  el.innerHTML = '<img src="' + p.src + '" alt="' + p.name + '"><div class="name">' + p.name + '</div>';
  wall.insertBefore(el, wall.firstChild);
  while (wall.children.length > 24) wall.removeChild(wall.lastChild);
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

window.setMode = function(m) {
  mode = m;
  document.getElementById('wallBtn').classList.toggle('on', m === 'wall');
  document.getElementById('slideBtn').classList.toggle('on', m === 'slide');
  if (photos.length === 0) return;
  if (m === 'wall') {
    wall.classList.add('on');
    slides.classList.remove('on');
    stopSlide();
    wall.innerHTML = '';
    photos.slice(-24).reverse().forEach(p => {
      const el = document.createElement('div');
      el.className = 'wall-item';
      el.innerHTML = '<img src="' + p.src + '" alt="' + p.name + '"><div class="name">' + p.name + '</div>';
      wall.appendChild(el);
    });
  } else {
    wall.classList.remove('on');
    slides.classList.add('on');
    startSlide();
  }
};

function startSlide() {
  stopSlide();
  showSlide(slideIdx);
  timer = setInterval(() => {
    if (!paused) { slideIdx = (slideIdx + 1) % photos.length; showSlide(slideIdx); }
  }, 4000);
}

function stopSlide() {
  if (timer) { clearInterval(timer); timer = null; }
}

function showSlide(i) {
  const p = photos[i];
  const next = cur === 1 ? 2 : 1;
  const nImg = document.getElementById('img' + next);
  const cImg = document.getElementById('img' + cur);
  nImg.src = p.src;
  nImg.onload = () => { nImg.classList.add('show'); cImg.classList.remove('show'); cur = next; };
  document.getElementById('slideName').textContent = p.name;
  const d = p.ts ? new Date(p.ts) : new Date();
  document.getElementById('slideTime').textContent = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
}

window.togglePause = function() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? '▶ 再生' : '⏸ 一時停止';
  btn.classList.toggle('on', paused);
};
</script>
</body>
</html>
