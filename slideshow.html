<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📸 MIXTAR NIGHT 2026 - ライブフォト</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060810;
      color: #e8e0d0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ヘッダー */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .live-badge {
      background: #c03030;
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 3px 10px;
      border-radius: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-title { font-size: 15px; font-weight: 600; color: #c0d0e0; letter-spacing: 1px; }
    .photo-count { font-size: 13px; color: #607080; }

    .controls button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 5px 12px;
      color: #c0d0e0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 6px;
    }

    .controls button:hover { background: rgba(255,255,255,0.15); }
    .controls button.active { background: rgba(100,160,220,0.2); border-color: rgba(100,160,220,0.5); color: #80c0f0; }

    /* メインエリア */
    .main-area { flex: 1; position: relative; overflow: hidden; }

    /* 待機画面 */
    .waiting-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a2040 0%, #060810 70%);
    }

    .waiting-icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .waiting-title { font-size: 28px; font-weight: 700; color: #c0d0e0; margin-bottom: 12px; letter-spacing: 2px; }
    .waiting-subtitle { font-size: 16px; color: #607080; text-align: center; line-height: 1.8; }

    /* ウォールモード */
    .photo-wall {
      width: 100%;
      height: 100%;
      padding: 10px;
      overflow: hidden;
      display: none;
    }

    .photo-wall.active {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      grid-auto-rows: 180px;
      gap: 8px;
      align-content: start;
    }

    .wall-item {
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.05);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .wall-item img { width: 100%; height: 100%; object-fit: cover; }

    .wall-item .photo-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 20px 8px 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
    }

    /* スライドショーモード */
    .slideshow-view { width: 100%; height: 100%; display: none; position: relative; }
    .slideshow-view.active { display: block; }

    .slide-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .slide-img.visible { opacity: 1; }

    .slide-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 40px 30px 20px;
      z-index: 5;
    }

    .slide-name { font-size: 18px; color: rgba(255,255,255,0.9); font-weight: 500; }
    .slide-time { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }

    /* 新着通知 */
    .new-photo-toast {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(40,80,120,0.95);
      border: 1px solid rgba(100,160,220,0.5);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 14px;
      color: #c0e0ff;
      z-index: 100;
      transform: translateX(200%);
      transition: transform 0.4s ease;
    }

    .new-photo-toast.show { transform: translateX(0); }

    /* 星 */
    .star {
      position: fixed;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>

  <!-- 星 -->
  <div id="starsContainer"></div>

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <div class="live-badge">● LIVE</div>
      <div class="header-title">🌙 MIXTAR NIGHT 2026 — みんなの写真</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="photo-count" id="photoCount">0枚</div>
      <div class="controls">
        <button id="wallBtn" class="active" onclick="setMode('wall')">🖼 ウォール</button>
        <button id="slideshowBtn" onclick="setMode('slideshow')">▶ スライドショー</button>
        <button id="pauseBtn" onclick="togglePause()">⏸ 一時停止</button>
      </div>
    </div>
  </div>

  <!-- メインエリア -->
  <div class="main-area">

    <div class="waiting-screen" id="waitingScreen">
      <div class="waiting-icon">📸</div>
      <div class="waiting-title">写真を待っています…</div>
      <div class="waiting-subtitle">
        参加者がアップロードすると<br>ここに自動で表示されます
      </div>
    </div>

    <div class="photo-wall" id="photoWall"></div>

    <div class="slideshow-view" id="slideshowView">
      <img class="slide-img" id="slideImg1" src="" alt="">
      <img class="slide-img" id="slideImg2" src="" alt="">
      <div class="slide-overlay">
        <div class="slide-name" id="slideName"></div>
        <div class="slide-time" id="slideTime"></div>
      </div>
    </div>
  </div>

  <!-- 新着通知 -->
  <div class="new-photo-toast" id="toast">📸 新しい写真が届きました！</div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onChildAdded, query, orderByChild } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // ============================================================
    // Firebase設定（設定済み）
    // ============================================================
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAHubbfHAewDWar-XxuL3q_n-hZZs4_uTs",
      authDomain: "mikusuta-night-2026.firebaseapp.com",
      databaseURL: "https://mikusuta-night-2026-default-rtdb.firebaseio.com",
      projectId: "mikusuta-night-2026",
      storageBucket: "mikusuta-night-2026.firebasestorage.app",
      messagingSenderId: "618005165983",
      appId: "1:618005165983:web:0a36dcf44ca19838baafaa"
    };
    // ============================================================

    const app = initializeApp(FIREBASE_CONFIG);
    const database = getDatabase(app);

    // 星を生成
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2 + 0.5;
      star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
      document.getElementById('starsContainer').appendChild(star);
    }

    let allPhotos = [];
    let currentMode = 'wall';
    let isPaused = false;
    let slideshowIndex = 0;
    let slideshowTimer = null;
    let currentSlide = 1;

    const waitingScreen = document.getElementById('waitingScreen');
    const photoWall = document.getElementById('photoWall');
    const slideshowView = document.getElementById('slideshowView');
    const photoCount = document.getElementById('photoCount');
    const toast = document.getElementById('toast');

    // Firebase リアルタイムリスナー
    const photosRef = query(ref(database, 'photos'), orderByChild('timestamp'));
    onChildAdded(photosRef, (snapshot) => {
      const data = snapshot.val();
      if (!data || !data.images) return;

      data.images.forEach(base64 => {
        allPhotos.push({
          src: base64,
          nickname: data.nickname || '匿名',
          timestamp: data.timestamp
        });
      });

      updatePhotoCount();

      if (allPhotos.length > 0) {
        waitingScreen.style.display = 'none';
        if (currentMode === 'wall') {
          addWallItem(allPhotos[allPhotos.length - 1]);
        }
      }

      showToast(`📸 ${data.nickname || '匿名'}さんが写真を送りました！`);
    });

    function updatePhotoCount() {
      photoCount.textContent = `${allPhotos.length}枚`;
    }

    function addWallItem(photo) {
      if (!photoWall.classList.contains('active')) return;
      const item = document.createElement('div');
      item.className = 'wall-item';
      item.innerHTML = `<img src="${photo.src}" alt="${photo.nickname}"><div class="photo-name">${photo.nickname}</div>`;
      photoWall.insertBefore(item, photoWall.firstChild);
      while (photoWall.children.length > 24) photoWall.removeChild(photoWall.lastChild);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    window.setMode = function(mode) {
      currentMode = mode;
      document.getElementById('wallBtn').classList.toggle('active', mode === 'wall');
      document.getElementById('slideshowBtn').classList.toggle('active', mode === 'slideshow');

      if (allPhotos.length === 0) return;

      if (mode === 'wall') {
        photoWall.classList.add('active');
        slideshowView.classList.remove('active');
        stopSlideshow();
        photoWall.innerHTML = '';
        allPhotos.slice(-24).reverse().forEach(photo => {
          const item = document.createElement('div');
          item.className = 'wall-item';
          item.innerHTML = `<img src="${photo.src}" alt="${photo.nickname}"><div class="photo-name">${photo.nickname}</div>`;
          photoWall.appendChild(item);
        });
      } else {
        photoWall.classList.remove('active');
        slideshowView.classList.add('active');
        startSlideshow();
      }
    };

    function startSlideshow() {
      if (allPhotos.length === 0) return;
      stopSlideshow();
      showSlide(slideshowIndex);
      slideshowTimer = setInterval(() => {
        if (!isPaused) {
          slideshowIndex = (slideshowIndex + 1) % allPhotos.length;
          showSlide(slideshowIndex);
        }
      }, 4000);
    }

    function stopSlideshow() {
      if (slideshowTimer) { clearInterval(slideshowTimer); slideshowTimer = null; }
    }

    function showSlide(index) {
      const photo = allPhotos[index];
      const next = currentSlide === 1 ? 2 : 1;
      const nextImg = document.getElementById(`slideImg${next}`);
      const currImg = document.getElementById(`slideImg${currentSlide}`);
      nextImg.src = photo.src;
      nextImg.onload = () => {
        nextImg.classList.add('visible');
        currImg.classList.remove('visible');
        currentSlide = next;
      };
      document.getElementById('slideName').textContent = photo.nickname;
      const d = photo.timestamp ? new Date(photo.timestamp) : new Date();
      document.getElementById('slideTime').textContent = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    window.togglePause = function() {
      isPaused = !isPaused;
      const btn = document.getElementById('pauseBtn');
      btn.textContent = isPaused ? '▶ 再生' : '⏸ 一時停止';
      btn.classList.toggle('active', isPaused);
    };
  </script>
</body>
</html>
