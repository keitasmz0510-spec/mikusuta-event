<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXTAR NIGHT 2026 - ライブフォト</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060810;
  color: #e8e0d0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  width: 100vw; height: 100vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  background: rgba(0,0,0,0.6);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0; z-index: 10; gap: 8px; flex-wrap: wrap;
}
.live { background: #c03030; color: white; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 3px 10px; border-radius: 4px; animation: blink 2s infinite; white-space: nowrap; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.title { font-size: 14px; font-weight: 600; color: #c0d0e0; letter-spacing: 1px; margin-left: 10px; white-space: nowrap; }
.count { font-size: 12px; color: #607080; white-space: nowrap; }
.btns { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.btns button {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 5px 10px; color: #c0d0e0; font-size: 12px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btns button:hover { background: rgba(255,255,255,0.15); }
.btns button.on { background: rgba(100,160,220,0.2); border-color: rgba(100,160,220,0.5); color: #80c0f0; }
.btns button.danger { border-color: rgba(200,60,60,0.4); color: #f08080; }
.btns button.danger:hover { background: rgba(200,60,60,0.2); }
.main { flex: 1; position: relative; overflow: hidden; }

/* 待機 */
.wait {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1a2040 0%, #060810 70%);
}
.wait-icon { font-size: 80px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.wait-title { font-size: 28px; font-weight: 700; color: #c0d0e0; margin-bottom: 12px; }
.wait-sub { font-size: 16px; color: #607080; text-align: center; line-height: 1.8; }

/* ウォール */
.wall { width: 100%; height: 100%; padding: 10px; overflow: hidden; display: none; }
.wall.on {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  grid-auto-rows: 180px; gap: 8px; align-content: start;
}
.wall-item {
  border-radius: 10px; overflow: hidden; position: relative;
  background: rgba(255,255,255,0.05); animation: pop 0.6s ease; cursor: pointer;
}
@keyframes pop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
.wall-item img { width: 100%; height: 100%; object-fit: cover; }
.wall-item .name {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  padding: 20px 8px 6px; font-size: 11px; color: rgba(255,255,255,0.85);
}
.wall-item .del-btn {
  position: absolute; top: 4px; right: 4px;
  background: rgba(180,30,30,0.85); border: none; border-radius: 50%;
  width: 22px; height: 22px; color: white; font-size: 12px; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
}
.wall-item:hover .del-btn { display: flex; }

/* スライドショー */
.slides { width: 100%; height: 100%; display: none; position: relative; }
.slides.on { display: block; }
.slide-img {
  width: 100%; height: 100%; object-fit: contain;
  position: absolute; top: 0; left: 0;
  opacity: 0; transition: opacity 1s ease;
}
.slide-img.show { opacity: 1; }
.slide-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 50px 30px 20px; z-index: 5;
}
.slide-name { font-size: 18px; color: rgba(255,255,255,0.9); font-weight: 500; }
.slide-comment { font-size: 15px; color: rgba(255,220,100,0.9); margin-top: 5px; font-style: italic; }
.slide-time { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.slide-del {
  position: absolute; top: 16px; right: 16px; z-index: 20;
  background: rgba(180,30,30,0.8); border: 1px solid rgba(255,100,100,0.4);
  border-radius: 8px; padding: 6px 14px; color: #ffc0c0; font-size: 13px;
  cursor: pointer; display: none;
}
.slides.on:hover .slide-del { display: block; }

/* QRコード全画面オーバーレイ */
.qr-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(6,8,16,0.96); z-index: 300;
  flex-direction: column; align-items: center; justify-content: center;
}
.qr-overlay.show { display: flex; }
.qr-box {
  background: white; border-radius: 20px; padding: 24px;
  display: flex; flex-direction: column; align-items: center;
}
.qr-box canvas { display: block; }
.qr-label { font-size: 14px; color: #333; margin-top: 12px; text-align: center; font-weight: 600; }
.qr-url { font-size: 11px; color: #666; margin-top: 4px; word-break: break-all; text-align: center; max-width: 260px; }
.qr-close {
  margin-top: 28px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
  padding: 10px 28px; color: #c0d0e0; font-size: 15px; cursor: pointer;
}
.qr-hint { font-size: 13px; color: #607080; margin-top: 12px; }

/* QRコード常時表示（右下隅） */
.qr-corner {
  position: fixed; bottom: 54px; right: 12px; z-index: 50;
  background: white; border-radius: 10px; padding: 6px;
  cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}
.qr-corner:hover { transform: scale(1.05); }
.qr-corner canvas { display: block; }
.qr-corner-label { font-size: 9px; color: #333; text-align: center; margin-top: 3px; font-weight: 600; }

/* パスワードモーダル */
.pw-modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200;
  align-items: center; justify-content: center;
}
.pw-modal-bg.show { display: flex; }
.pw-modal {
  background: #1a1e30; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 28px 32px; text-align: center; max-width: 320px; width: 90%;
}
.pw-modal h3 { font-size: 18px; margin-bottom: 8px; }
.pw-modal p { font-size: 13px; color: #8090a8; margin-bottom: 16px; }
.pw-modal input {
  width: 100%; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
  padding: 10px 14px; color: #e8e0d0; font-size: 20px;
  text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 14px;
}
.pw-error { font-size: 13px; color: #f08080; min-height: 18px; margin-bottom: 8px; }
.pw-btns { display: flex; gap: 10px; justify-content: center; }
.pw-btns button { border-radius: 10px; padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; }
.btn-cancel { background: rgba(255,255,255,0.1); color: #c0d0e0; }
.btn-ok { background: #2a5080; color: #c0d8f0; }

/* 削除確認モーダル */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 150;
  align-items: center; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: #1a1e30; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 28px 32px; text-align: center; max-width: 320px; width: 90%;
}
.modal h3 { font-size: 18px; margin-bottom: 10px; }
.modal p { font-size: 14px; color: #8090a8; margin-bottom: 20px; line-height: 1.6; white-space: pre-line; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.modal-btns button { border-radius: 10px; padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; }
.btn-del { background: #a02020; color: #ffd0d0; }
.btn-delall { background: #601010; color: #ffd0d0; }

/* トースト */
.toast {
  position: fixed; top: 60px; right: 20px;
  background: rgba(40,80,120,0.95); border: 1px solid rgba(100,160,220,0.5);
  border-radius: 12px; padding: 10px 18px; font-size: 14px; color: #c0e0ff;
  z-index: 400; transform: translateX(200%); transition: transform 0.4s ease; pointer-events: none;
}
.toast.show { transform: translateX(0); }

/* BGMバー */
.bgm-bar {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(20,30,50,0.9); border: 1px solid rgba(100,160,220,0.3);
  border-radius: 30px; padding: 6px 16px;
  display: flex; align-items: center; gap: 10px;
  z-index: 50; font-size: 12px; color: #8090a8; backdrop-filter: blur(8px);
}
.bgm-bar button { background: none; border: none; color: #80b0e0; font-size: 16px; cursor: pointer; padding: 0 2px; }
.bgm-note { animation: spin 4s linear infinite; display: inline-block; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.vol-slider { width: 70px; accent-color: #4080c0; }
.track-name { font-size: 11px; color: #607080; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="live">● LIVE</div>
    <div class="title">🌙 MIXTAR NIGHT 2026</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <div class="count" id="count">0枚</div>
    <div class="btns">
      <button id="wallBtn" class="on" onclick="setMode('wall')">🖼 ウォール</button>
      <button id="slideBtn" onclick="setMode('slide')">▶ スライドショー</button>
      <button id="pauseBtn" onclick="togglePause()">⏸ 一時停止</button>
      <button onclick="showQrFull()">📱 QRコード</button>
      <button class="danger" onclick="requestDelete('all')">🗑 全削除</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="wait" id="wait">
    <div class="wait-icon">📸</div>
    <div class="wait-title">写真を待っています…</div>
    <div class="wait-sub">参加者がアップロードすると<br>ここに自動で表示されます</div>
  </div>
  <div class="wall" id="wall"></div>
  <div class="slides" id="slides">
    <img class="slide-img" id="img1" src="" alt="">
    <img class="slide-img" id="img2" src="" alt="">
    <div class="slide-info">
      <div class="slide-name" id="slideName"></div>
      <div class="slide-comment" id="slideComment"></div>
      <div class="slide-time" id="slideTime"></div>
    </div>
    <button class="slide-del" onclick="requestDelete('current')">🗑 この写真を削除</button>
  </div>
</div>

<!-- QRコード全画面 -->
<div class="qr-overlay" id="qrOverlay">
  <div class="qr-box">
    <canvas id="qrCanvasFull"></canvas>
    <div class="qr-label">📸 写真を送る</div>
    <div class="qr-url" id="qrUrlLabel"></div>
  </div>
  <div class="qr-hint">このQRコードをスマホで読み取ってください</div>
  <button class="qr-close" onclick="hideQrFull()">✕ 閉じる</button>
</div>

<!-- QRコード右下隅 -->
<div class="qr-corner" id="qrCorner" onclick="showQrFull()" title="クリックで全画面表示">
  <canvas id="qrCanvasCorner"></canvas>
  <div class="qr-corner-label">📸 写真を送る</div>
</div>

<!-- パスワード入力モーダル -->
<div class="pw-modal-bg" id="pwModalBg">
  <div class="pw-modal">
    <h3>🔐 管理者認証</h3>
    <p>削除するにはパスワードを入力してください</p>
    <input type="password" id="pwInput" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-error" id="pwError"></div>
    <div class="pw-btns">
      <button class="btn-cancel" onclick="closePwModal()">キャンセル</button>
      <button class="btn-ok" onclick="checkPw()">確認</button>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">削除しますか？</h3>
    <p id="modalMsg"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button id="modalOkBtn" class="btn-del" onclick="doDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- BGMバー -->
<div class="bgm-bar">
  <span class="bgm-note" id="bgmNote" style="animation-play-state:paused;">🎵</span>
  <span class="track-name" id="trackName">BGM 1</span>
  <button onclick="prevTrack()">⏮</button>
  <button onclick="toggleBgm()" id="bgmBtn">▶</button>
  <button onclick="nextTrack()">⏭</button>
  <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="40" oninput="setVol(this.value)">
  <span id="volLabel">40%</span>
</div>

<!-- BGM audio -->
<audio id="bgmAudio" onended="nextTrack()"></audio>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onChildAdded, remove, query, orderByChild } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const config = {
  apiKey: "AIzaSyAHubbfHAewDWar-XxuL3q_n-hZZs4_uTs",
  authDomain: "mikusuta-night-2026.firebaseapp.com",
  databaseURL: "https://mikusuta-night-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mikusuta-night-2026",
  storageBucket: "mikusuta-night-2026.firebasestorage.app",
  messagingSenderId: "618005165983",
  appId: "1:618005165983:web:0a36dcf44ca19838baafaa"
};

const app = initializeApp(config);
const db = getDatabase(app);

// ---- 設定 ----
const ADMIN_PASSWORD = '1234'; // ← ここを変更してください
const UPLOAD_URL = 'https://keitasmz0510-spec.github.io/mikusuta-event/photo-upload.html';

// ---- 状態 ----
let photos = [];
let mode = 'wall';
let paused = false;
let slideIdx = 0;
let timer = null;
let cur = 1;
let deleteTarget = null;
let deleteKey = null;
let pendingDeleteType = null;

const wait = document.getElementById('wait');
const wall = document.getElementById('wall');
const slides = document.getElementById('slides');
const countEl = document.getElementById('count');
const toast = document.getElementById('toast');
const bgmAudio = document.getElementById('bgmAudio');

// ---- BGM ----
const tracks = [
  { src: 'bgm.mp3', name: '🎷 ラウンジジャズ' },
  { src: 'bgm2.mp3', name: '🎉 パーティービート' }
];
let trackIdx = 0;

function loadTrack(i) {
  trackIdx = (i + tracks.length) % tracks.length;
  bgmAudio.src = tracks[trackIdx].src;
  bgmAudio.load();
  document.getElementById('trackName').textContent = tracks[trackIdx].name;
  if (!bgmAudio.paused) bgmAudio.play().catch(() => {});
}

window.toggleBgm = function() {
  if (bgmAudio.paused) {
    if (!bgmAudio.src || bgmAudio.src === window.location.href) loadTrack(0);
    bgmAudio.play().then(() => {
      document.getElementById('bgmBtn').textContent = '⏸';
      document.getElementById('bgmNote').style.animationPlayState = 'running';
    }).catch(() => showToast('BGMの再生にはクリックが必要です'));
  } else {
    bgmAudio.pause();
    document.getElementById('bgmBtn').textContent = '▶';
    document.getElementById('bgmNote').style.animationPlayState = 'paused';
  }
};

window.nextTrack = function() { loadTrack(trackIdx + 1); };
window.prevTrack = function() { loadTrack(trackIdx - 1); };
window.setVol = function(v) { bgmAudio.volume = v / 100; document.getElementById('volLabel').textContent = v + '%'; };
bgmAudio.volume = 0.4;

// ---- QRコード生成 ----
function makeQR(canvasId, size) {
  const el = document.getElementById(canvasId);
  new QRCode(el, { text: UPLOAD_URL, width: size, height: size, correctLevel: QRCode.CorrectLevel.M });
}
document.getElementById('qrUrlLabel').textContent = UPLOAD_URL;
makeQR('qrCanvasFull', 260);
makeQR('qrCanvasCorner', 72);

window.showQrFull = function() { document.getElementById('qrOverlay').classList.add('show'); };
window.hideQrFull = function() { document.getElementById('qrOverlay').classList.remove('show'); };

// ---- Firebase 受信 ----
onChildAdded(query(ref(db, 'photos'), orderByChild('timestamp')), (snap) => {
  const d = snap.val();
  if (!d || !d.image) return;
  photos.push({ key: snap.key, src: d.image, name: d.nickname || '匿名', comment: d.comment || '', ts: d.timestamp });
  countEl.textContent = photos.length + '枚';
  showToast('📸 ' + (d.nickname || '匿名') + 'さんが写真を送りました！');
  if (photos.length === 1) {
    wait.style.display = 'none';
    setMode(mode);
  } else if (mode === 'wall') {
    addWallItemEl(photos[photos.length - 1]);
  }
});

// ---- ウォール ----
function addWallItemEl(p) {
  const el = document.createElement('div');
  el.className = 'wall-item';
  el.dataset.key = p.key;
  el.innerHTML = `<img src="${p.src}" alt="${p.name}"><div class="name">${p.name}${p.comment ? ' 💬' : ''}</div><button class="del-btn" title="削除">✕</button>`;
  el.querySelector('.del-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    requestDelete('key', p.key, p.name);
  });
  wall.insertBefore(el, wall.firstChild);
  while (wall.children.length > 24) wall.removeChild(wall.lastChild);
}

// ---- モード切替 ----
window.setMode = function(m) {
  mode = m;
  document.getElementById('wallBtn').classList.toggle('on', m === 'wall');
  document.getElementById('slideBtn').classList.toggle('on', m === 'slide');
  if (photos.length === 0) return;
  if (m === 'wall') {
    wall.classList.add('on'); slides.classList.remove('on');
    stopSlide(); wall.innerHTML = '';
    photos.slice(-24).reverse().forEach(p => addWallItemElDirect(p));
  } else {
    wall.classList.remove('on'); slides.classList.add('on');
    startSlide();
  }
};

function addWallItemElDirect(p) {
  const el = document.createElement('div');
  el.className = 'wall-item';
  el.dataset.key = p.key;
  el.innerHTML = `<img src="${p.src}" alt="${p.name}"><div class="name">${p.name}${p.comment ? ' 💬' : ''}</div><button class="del-btn" title="削除">✕</button>`;
  el.querySelector('.del-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    requestDelete('key', p.key, p.name);
  });
  wall.appendChild(el);
}

// ---- スライドショー ----
function startSlide() {
  stopSlide();
  if (photos.length === 0) return;
  showSlide(slideIdx);
  timer = setInterval(() => {
    if (!paused && photos.length > 0) { slideIdx = (slideIdx + 1) % photos.length; showSlide(slideIdx); }
  }, 5000);
}

function stopSlide() { if (timer) { clearInterval(timer); timer = null; } }

function showSlide(i) {
  if (photos.length === 0) return;
  const p = photos[i];
  const next = cur === 1 ? 2 : 1;
  const nImg = document.getElementById('img' + next);
  const cImg = document.getElementById('img' + cur);
  nImg.src = p.src;
  nImg.onload = () => { nImg.classList.add('show'); cImg.classList.remove('show'); cur = next; };
  document.getElementById('slideName').textContent = p.name;
  const commentEl = document.getElementById('slideComment');
  if (p.comment) { commentEl.textContent = '💬 ' + p.comment; commentEl.style.display = 'block'; }
  else { commentEl.style.display = 'none'; }
  const d = p.ts ? new Date(p.ts) : new Date();
  document.getElementById('slideTime').textContent = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
}

window.togglePause = function() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? '▶ 再生' : '⏸ 一時停止';
  btn.classList.toggle('on', paused);
};

// ---- 削除（パスワード保護付き） ----
window.requestDelete = function(type, key, name) {
  pendingDeleteType = type;
  deleteKey = key || null;
  // パスワードモーダルを表示
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  document.getElementById('pwModalBg').classList.add('show');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
};

window.closePwModal = function() {
  document.getElementById('pwModalBg').classList.remove('show');
  pendingDeleteType = null; deleteKey = null;
};

window.checkPw = function() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('pwModalBg').classList.remove('show');
    // パスワード正解 → 削除確認モーダルへ
    if (pendingDeleteType === 'key') {
      deleteTarget = 'key';
      const p = photos.find(x => x.key === deleteKey);
      const name = p ? p.name : '不明';
      document.getElementById('modalTitle').textContent = '写真を削除しますか？';
      document.getElementById('modalMsg').textContent = `「${name}」さんの写真を削除します。\nこの操作は元に戻せません。`;
      document.getElementById('modalOkBtn').textContent = '削除する';
      document.getElementById('modalOkBtn').className = 'btn-del';
    } else if (pendingDeleteType === 'current') {
      deleteTarget = 'key';
      deleteKey = photos[slideIdx]?.key;
      const name = photos[slideIdx]?.name || '不明';
      document.getElementById('modalTitle').textContent = '写真を削除しますか？';
      document.getElementById('modalMsg').textContent = `「${name}」さんの写真を削除します。\nこの操作は元に戻せません。`;
      document.getElementById('modalOkBtn').textContent = '削除する';
      document.getElementById('modalOkBtn').className = 'btn-del';
    } else {
      deleteTarget = 'all';
      document.getElementById('modalTitle').textContent = '全ての写真を削除しますか？';
      document.getElementById('modalMsg').textContent = `現在 ${photos.length} 枚の写真があります。\n全て削除します。この操作は元に戻せません。`;
      document.getElementById('modalOkBtn').textContent = '全て削除する';
      document.getElementById('modalOkBtn').className = 'btn-delall';
    }
    document.getElementById('modalBg').classList.add('show');
  } else {
    document.getElementById('pwError').textContent = '❌ パスワードが違います';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
};

window.closeModal = function() { document.getElementById('modalBg').classList.remove('show'); };

window.doDelete = async function() {
  closeModal();
  const { getDatabase: gdb, ref: dbRef, remove: dbRemove } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  if (deleteTarget === 'key' && deleteKey) {
    try {
      await dbRemove(dbRef(db, 'photos/' + deleteKey));
      photos = photos.filter(p => p.key !== deleteKey);
      countEl.textContent = photos.length + '枚';
      showToast('🗑 写真を削除しました');
      if (photos.length === 0) {
        stopSlide(); wait.style.display = 'flex';
        wall.classList.remove('on'); slides.classList.remove('on'); wall.innerHTML = '';
      } else {
        if (slideIdx >= photos.length) slideIdx = photos.length - 1;
        if (mode === 'wall') { wall.innerHTML = ''; photos.slice(-24).reverse().forEach(p => addWallItemElDirect(p)); }
        else showSlide(slideIdx);
      }
    } catch(e) { showToast('❌ 削除エラー: ' + e.message); }
  } else if (deleteTarget === 'all') {
    try {
      await dbRemove(dbRef(db, 'photos'));
      photos = []; countEl.textContent = '0枚';
      stopSlide(); wall.innerHTML = '';
      wall.classList.remove('on'); slides.classList.remove('on');
      wait.style.display = 'flex';
      showToast('🗑 全ての写真を削除しました');
    } catch(e) { showToast('❌ 削除エラー: ' + e.message); }
  }
};

// ---- トースト ----
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
