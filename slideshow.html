<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXTAR NIGHT 2026 - ライブフォト</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060810;
  color: #e8e0d0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  width: 100vw; height: 100vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* ヘッダー */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  background: rgba(0,0,0,0.7);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0; z-index: 10; gap: 8px; flex-wrap: wrap;
}
.live {
  background: #c03030; color: white; font-size: 11px; font-weight: 700;
  letter-spacing: 2px; padding: 3px 10px; border-radius: 4px;
  animation: blink 2s infinite; white-space: nowrap;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.title { font-size: 14px; font-weight: 600; color: #c0d0e0; letter-spacing: 1px; margin-left: 10px; white-space: nowrap; }
.count { font-size: 12px; color: #607080; white-space: nowrap; }
.btns { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.btns button {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 5px 8px; color: #c0d0e0; font-size: 11px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btns button:hover { background: rgba(255,255,255,0.15); }
.btns button.on { background: rgba(100,160,220,0.2); border-color: rgba(100,160,220,0.5); color: #80c0f0; }
.btns button.danger { border-color: rgba(200,60,60,0.4); color: #f08080; }
.btns button.danger:hover { background: rgba(200,60,60,0.2); }
.btn-fullscreen {
  background: rgba(80,180,80,0.2) !important;
  border-color: rgba(80,180,80,0.5) !important;
  color: #80e080 !important;
  font-size: 13px !important;
  padding: 5px 12px !important;
}

/* メインエリア */
.main { flex: 1; position: relative; overflow: hidden; }

/* 待機画面 */
.wait {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1a2040 0%, #060810 70%);
}
.wait-icon { font-size: 80px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.wait-title { font-size: 28px; font-weight: 700; color: #c0d0e0; margin-bottom: 12px; }
.wait-sub { font-size: 16px; color: #607080; text-align: center; line-height: 1.8; }

/* ウォール */
.wall {
  width: 100%; height: 100%; padding: 10px; overflow: hidden;
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  grid-auto-rows: 180px; gap: 8px; align-content: start;
}
.wall.on { display: grid; }
.wall-item {
  border-radius: 10px; overflow: hidden; position: relative;
  background: rgba(255,255,255,0.05); animation: pop 0.6s ease;
}
@keyframes pop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
.wall-item img { width: 100%; height: 100%; object-fit: cover; }
.wall-item .name {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  padding: 20px 8px 6px; font-size: 11px; color: rgba(255,255,255,0.85);
}
.wall-item .del-btn {
  position: absolute; top: 4px; right: 4px;
  background: rgba(180,30,30,0.85); border: none; border-radius: 50%;
  width: 22px; height: 22px; color: white; font-size: 12px; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
}
.wall-item:hover .del-btn { display: flex; }
/* ドラッグ中スタイル */
.wall-item.dragging { opacity: 0.4; transform: scale(0.95); cursor: grabbing; }
.wall-item.drag-over { outline: 2px dashed rgba(100,160,220,0.8); outline-offset: -2px; }
/* 先頭移動ボタン */
.wall-item .top-btn {
  position: absolute; top: 4px; left: 4px;
  background: rgba(40,100,180,0.85); border: none; border-radius: 50%;
  width: 22px; height: 22px; color: white; font-size: 11px; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
  font-weight: 700;
}
.wall-item:hover .top-btn { display: flex; }
/* 並び替えボタン */
.sort-btns { display: flex; gap: 4px; align-items: center; }
.sort-btns button {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; padding: 5px 8px; color: #a0b0c0; font-size: 11px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.sort-btns button:hover { background: rgba(255,255,255,0.13); }
.sort-btns button.on { background: rgba(100,160,220,0.2); border-color: rgba(100,160,220,0.5); color: #80c0f0; }

/* スライドショー */
.slides { width: 100%; height: 100%; display: none; position: relative; overflow: hidden; }
.slides.on { display: block; }
/* 背景ぼかし（黒帯なし） */
.slide-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: blur(24px) brightness(0.45) saturate(1.4);
  transform: scale(1.08);
  opacity: 0; transition: opacity 0.8s ease;
}
.slide-bg.show { opacity: 1; }
/* メイン写真（縦横比保持・中央） */
.slide-img {
  width: 100%; height: 100%; object-fit: contain;
  position: absolute; top: 0; left: 0;
  opacity: 0; transition: opacity 0.8s ease;
  z-index: 2;
}
.slide-img.show { opacity: 1; }

/* コメント：上部に大きく表示 */
.slide-comment-top {
  position: absolute; top: 0; left: 0; right: 0;
  background: linear-gradient(rgba(0,0,0,0.85), transparent);
  padding: 20px 30px 60px; z-index: 10;
  display: none;
}
.slide-comment-text {
  font-size: 72px; font-weight: 900;
  color: #ffe566;
  text-shadow: 0 3px 20px rgba(0,0,0,0.98), 0 0 50px rgba(255,200,0,0.3);
  line-height: 1.25; letter-spacing: 0.5px;
}

/* 名前・時刻：下部 */
.slide-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.80));
  padding: 60px 30px 20px; z-index: 10;
}
.slide-name { font-size: 52px; color: rgba(255,255,255,0.95); font-weight: 700; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
.slide-time { font-size: 28px; color: rgba(255,255,255,0.5); margin-top: 6px; }

/* 前後ナビボタン */
.nav-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%; width: 48px; height: 48px;
  color: rgba(255,255,255,0.8); font-size: 22px;
  cursor: pointer; z-index: 10;
  display: none; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.nav-btn:hover { background: rgba(0,0,0,0.7); }
.nav-prev { left: 12px; }
.nav-next { right: 12px; }
.slides.on .nav-btn { display: flex; }

/* 削除ボタン（スライドショー時） */
.slide-del {
  position: absolute; top: 16px; right: 16px; z-index: 20;
  background: rgba(180,30,30,0.8); border: 1px solid rgba(255,100,100,0.4);
  border-radius: 8px; padding: 6px 14px; color: #ffc0c0; font-size: 13px;
  cursor: pointer; display: none;
}
.slides.on:hover .slide-del { display: block; }

/* QRコード全画面オーバーレイ */
.qr-overlay {
  display: none; position: fixed; inset: 0;
  background: #ffffff; z-index: 300;
  flex-direction: column; align-items: center; justify-content: center;
}
.qr-overlay.show { display: flex; }
.qr-box {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; height: 100%; justify-content: center; padding: 20px;
}
.qr-box img { display: block; width: min(80vw, 80vh); height: min(80vw, 80vh); image-rendering: pixelated; }
.qr-label { font-size: clamp(24px, 4vw, 48px); color: #111; margin-top: 20px; font-weight: 800; }
.qr-url { font-size: clamp(12px, 1.5vw, 20px); color: #555; margin-top: 8px; word-break: break-all; text-align: center; max-width: 80vw; }
.qr-hint { font-size: clamp(16px, 2.5vw, 32px); color: #333; margin-top: 16px; font-weight: 600; }
.qr-close {
  position: fixed; top: 20px; right: 20px;
  background: rgba(0,0,0,0.15); border: 2px solid rgba(0,0,0,0.3);
  border-radius: 12px; padding: 10px 24px; color: #333; font-size: 18px; cursor: pointer;
  font-weight: 700;
}

/* パスワードモーダル */
.pw-modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.78); z-index: 200;
  align-items: center; justify-content: center;
}
.pw-modal-bg.show { display: flex; }
.pw-modal {
  background: #1a1e30; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 28px 32px; text-align: center; max-width: 320px; width: 90%;
}
.pw-modal h3 { font-size: 18px; margin-bottom: 8px; }
.pw-modal p { font-size: 13px; color: #8090a8; margin-bottom: 16px; }
.pw-modal input {
  width: 100%; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
  padding: 10px 14px; color: #e8e0d0; font-size: 24px;
  text-align: center; letter-spacing: 6px; outline: none; margin-bottom: 10px;
}
.pw-error { font-size: 13px; color: #f08080; min-height: 18px; margin-bottom: 10px; }
.pw-btns { display: flex; gap: 10px; justify-content: center; }
.pw-btns button { border-radius: 10px; padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; }
.btn-cancel { background: rgba(255,255,255,0.1); color: #c0d0e0; }
.btn-ok { background: #2a5080; color: #c0d8f0; }

/* 削除確認モーダル */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); z-index: 150;
  align-items: center; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: #1a1e30; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 28px 32px; text-align: center; max-width: 320px; width: 90%;
}
.modal h3 { font-size: 18px; margin-bottom: 10px; }
.modal p { font-size: 14px; color: #8090a8; margin-bottom: 20px; line-height: 1.6; white-space: pre-line; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.modal-btns button { border-radius: 10px; padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; }
.btn-del { background: #a02020; color: #ffd0d0; }
.btn-delall { background: #601010; color: #ffd0d0; }

/* トースト */
.toast {
  position: fixed; top: 60px; right: 20px;
  background: rgba(40,80,120,0.95); border: 1px solid rgba(100,160,220,0.5);
  border-radius: 12px; padding: 10px 18px; font-size: 14px; color: #c0e0ff;
  z-index: 400; transform: translateX(200%); transition: transform 0.4s ease; pointer-events: none;
}
.toast.show { transform: translateX(0); }

/* クレジット */
.credit {
  position: fixed; bottom: 8px; right: 16px;
  font-size: 10px; color: rgba(255,255,255,0.18);
  letter-spacing: 1px; z-index: 5; pointer-events: none;
  font-style: italic;
}

/* BGMバー */
.bgm-bar {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(20,30,50,0.92); border: 1px solid rgba(100,160,220,0.3);
  border-radius: 30px; padding: 6px 18px;
  display: flex; align-items: center; gap: 10px;
  z-index: 50; font-size: 12px; color: #8090a8; backdrop-filter: blur(8px);
}
.bgm-bar button { background: none; border: none; color: #80b0e0; font-size: 18px; cursor: pointer; padding: 0 2px; }
.bgm-note { display: inline-block; }
.bgm-note.spin { animation: spin 4s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.vol-slider { width: 80px; accent-color: #4080c0; cursor: pointer; }
</style>
</head>
<body>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onChildAdded, remove, query, orderByChild } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ===== 設定 =====
const ADMIN_PASSWORD = '9999';
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAHubbfHAewDWar-XxuL3q_n-hZZs4_uTs",
  authDomain: "mikusuta-night-2026.firebaseapp.com",
  databaseURL: "https://mikusuta-night-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mikusuta-night-2026",
  storageBucket: "mikusuta-night-2026.firebasestorage.app",
  messagingSenderId: "618005165983",
  appId: "1:618005165983:web:0a36dcf44ca19838baafaa"
};

// ===== Firebase初期化 =====
const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);

// ===== 状態 =====
let photos = [];
let mode = 'wall';
let paused = false;
let slideIdx = 0;
let timer = null;
let cur = 1;
let pendingDeleteType = null;
let pendingDeleteKey = null;

// ===== DOM =====
const waitEl   = document.getElementById('wait');
const wallEl   = document.getElementById('wall');
const slidesEl = document.getElementById('slides');
const countEl  = document.getElementById('count');
const toastEl  = document.getElementById('toast');
const bgmAudio = document.getElementById('bgmAudio');

// ===== BGM =====
bgmAudio.src = 'bgm0.mp3';
bgmAudio.volume = 0.5;

window.toggleBgm = function() {
  if (bgmAudio.paused) {
    bgmAudio.play().then(() => {
      document.getElementById('bgmBtn').textContent = '⏸';
      document.getElementById('bgmNote').classList.add('spin');
    }).catch(() => showToast('▶ ボタンをもう一度押してください'));
  } else {
    bgmAudio.pause();
    document.getElementById('bgmBtn').textContent = '▶';
    document.getElementById('bgmNote').classList.remove('spin');
  }
};

window.setVol = function(v) {
  bgmAudio.volume = v / 100;
  document.getElementById('volLabel').textContent = v + '%';
};

// ===== QRコード =====
window.showQrFull = function() { document.getElementById('qrOverlay').classList.add('show'); };
window.hideQrFull = function() { document.getElementById('qrOverlay').classList.remove('show'); };

// ===== 全画面 =====
window.toggleFullscreen = function() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {
      showToast('全画面はF11キーでも切り替えられます');
    });
  } else {
    document.exitFullscreen();
  }
};

// ===== Firebase受信 =====
onChildAdded(query(ref(db, 'photos'), orderByChild('timestamp')), (snap) => {
  const d = snap.val();
  if (!d || !d.image) return;
  photos.push({ key: snap.key, src: d.image, name: d.nickname || '匿名', comment: d.comment || '', ts: d.timestamp });
  countEl.textContent = photos.length + '枚';
  showToast('📸 ' + (d.nickname || '匿名') + ' さんが写真を送りました！');
  if (photos.length === 1) {
    waitEl.style.display = 'none';
    setMode(mode);
    document.getElementById('sortBtns').style.display = mode === 'wall' ? 'flex' : 'none';
  } else if (mode === 'wall') {
    addWallItem(photos[photos.length - 1], true);
  }
});

// ===== ウォール =====
let dragSrc = null;

function addWallItem(p, prepend) {
  const el = document.createElement('div');
  el.className = 'wall-item';
  el.dataset.key = p.key;
  el.draggable = true;
  el.innerHTML = `<img src="${p.src}" alt="${p.name}">
    <div class="name">${p.name}${p.comment ? ' 💬' : ''}</div>
    <button class="top-btn" title="先頭に移動">↑</button>
    <button class="del-btn" title="削除">✕</button>`;
  // 先頭移動
  el.querySelector('.top-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    wallEl.insertBefore(el, wallEl.firstChild);
    showToast('↑ 先頭に移動しました');
  });
  // 削除
  el.querySelector('.del-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    requestDelete('key', p.key);
  });
  // ドラッグ＆ドロップ
  el.addEventListener('dragstart', (e) => {
    dragSrc = el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.wall-item').forEach(i => i.classList.remove('drag-over'));
  });
  el.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragSrc && dragSrc !== el) el.classList.add('drag-over');
  });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', (e) => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (!dragSrc || dragSrc === el) return;
    // ドラッグ元をターゲットの前に挿入
    const allItems = [...wallEl.children];
    const srcIdx = allItems.indexOf(dragSrc);
    const tgtIdx = allItems.indexOf(el);
    if (srcIdx < tgtIdx) {
      wallEl.insertBefore(dragSrc, el.nextSibling);
    } else {
      wallEl.insertBefore(dragSrc, el);
    }
  });
  if (prepend) {
    wallEl.insertBefore(el, wallEl.firstChild);
    while (wallEl.children.length > 24) wallEl.removeChild(wallEl.lastChild);
  } else {
    wallEl.appendChild(el);
  }
}

// 並び替え
window.sortWall = function(order) {
  document.getElementById('sortNewBtn').classList.toggle('on', order === 'new');
  document.getElementById('sortOldBtn').classList.toggle('on', order === 'old');
  const sorted = order === 'new'
    ? [...photos].reverse()
    : [...photos];
  wallEl.innerHTML = '';
  sorted.slice(-24).forEach(p => addWallItem(p, false));
  showToast(order === 'new' ? '🕐 新しい順に並び替えました' : '🕐 古い順に並び替えました');
};

// ===== モード切替 =====
window.setMode = function(m) {
  mode = m;
  document.getElementById('wallBtn').classList.toggle('on', m === 'wall');
  document.getElementById('slideBtn').classList.toggle('on', m === 'slide');
  // 並び替えボタンはウォール時のみ表示
  document.getElementById('sortBtns').style.display = (m === 'wall' && photos.length > 0) ? 'flex' : 'none';
  if (photos.length === 0) return;
  if (m === 'wall') {
    wallEl.classList.add('on'); slidesEl.classList.remove('on');
    stopSlide();
    wallEl.innerHTML = '';
    photos.slice(-24).reverse().forEach(p => addWallItem(p, false));
  } else {
    wallEl.classList.remove('on'); slidesEl.classList.add('on');
    startSlide();
  }
};

// ===== スライドショー =====
function startSlide() {
  stopSlide();
  if (photos.length === 0) return;
  showSlide(slideIdx);
  timer = setInterval(() => {
    if (!paused && photos.length > 0) {
      slideIdx = (slideIdx + 1) % photos.length;
      showSlide(slideIdx);
    }
  }, 5000);
}

function stopSlide() {
  if (timer) { clearInterval(timer); timer = null; }
}

function showSlide(i) {
  if (photos.length === 0) return;
  const p = photos[i];
  const next = cur === 1 ? 2 : 1;
  const nImg = document.getElementById('img' + next);
  const cImg = document.getElementById('img' + cur);
  const nBg  = document.getElementById('bg' + next);
  const cBg  = document.getElementById('bg' + cur);
  nImg.src = p.src;
  nBg.style.backgroundImage = `url('${p.src}')`;
  nImg.onload = () => {
    nImg.classList.add('show');
    nBg.classList.add('show');
    cImg.classList.remove('show');
    cBg.classList.remove('show');
    cur = next;
  };
  document.getElementById('slideName').textContent = p.name;
  const commentTop = document.getElementById('slideCommentTop');
  if (p.comment) {
    document.getElementById('slideCommentText').textContent = p.comment;
    commentTop.style.display = 'block';
  } else {
    commentTop.style.display = 'none';
  }
  const d = p.ts ? new Date(p.ts) : new Date();
  document.getElementById('slideTime').textContent =
    d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
}

window.togglePause = function() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? '▶ 再生' : '⏸ 一時停止';
  btn.classList.toggle('on', paused);
};

window.slidePrev = function() {
  if (photos.length === 0) return;
  // タイマーをリセット（自動スライドは継続）
  stopSlide();
  slideIdx = (slideIdx - 1 + photos.length) % photos.length;
  showSlide(slideIdx);
  // 自動スライドを再開
  timer = setInterval(() => {
    if (!paused && photos.length > 0) {
      slideIdx = (slideIdx + 1) % photos.length;
      showSlide(slideIdx);
    }
  }, 5000);
};

window.slideNext = function() {
  if (photos.length === 0) return;
  // タイマーをリセット（自動スライドは継続）
  stopSlide();
  slideIdx = (slideIdx + 1) % photos.length;
  showSlide(slideIdx);
  // 自動スライドを再開
  timer = setInterval(() => {
    if (!paused && photos.length > 0) {
      slideIdx = (slideIdx + 1) % photos.length;
      showSlide(slideIdx);
    }
  }, 5000);
};

// ===== 削除（パスワード保護） =====
window.requestDelete = function(type, key) {
  pendingDeleteType = type;
  pendingDeleteKey = key || null;
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  document.getElementById('pwModalBg').classList.add('show');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
};

window.closePwModal = function() {
  document.getElementById('pwModalBg').classList.remove('show');
  pendingDeleteType = null; pendingDeleteKey = null;
};

window.checkPw = function() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('pwModalBg').classList.remove('show');
    // 削除確認モーダルへ
    if (pendingDeleteType === 'key') {
      const p = photos.find(x => x.key === pendingDeleteKey);
      document.getElementById('modalTitle').textContent = '写真を削除しますか？';
      document.getElementById('modalMsg').textContent =
        `「${p ? p.name : '不明'}」さんの写真を削除します。\nこの操作は元に戻せません。`;
      document.getElementById('modalOkBtn').className = 'btn-del';
      document.getElementById('modalOkBtn').textContent = '削除する';
    } else if (pendingDeleteType === 'current') {
      pendingDeleteKey = photos[slideIdx]?.key;
      const p = photos[slideIdx];
      document.getElementById('modalTitle').textContent = '写真を削除しますか？';
      document.getElementById('modalMsg').textContent =
        `「${p ? p.name : '不明'}」さんの写真を削除します。\nこの操作は元に戻せません。`;
      document.getElementById('modalOkBtn').className = 'btn-del';
      document.getElementById('modalOkBtn').textContent = '削除する';
      pendingDeleteType = 'key';
    } else {
      document.getElementById('modalTitle').textContent = '全ての写真を削除しますか？';
      document.getElementById('modalMsg').textContent =
        `現在 ${photos.length} 枚の写真があります。\n全て削除します。この操作は元に戻せません。`;
      document.getElementById('modalOkBtn').className = 'btn-delall';
      document.getElementById('modalOkBtn').textContent = '全て削除する';
    }
    document.getElementById('modalBg').classList.add('show');
  } else {
    document.getElementById('pwError').textContent = '❌ パスワードが違います';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
};

window.closeModal = function() {
  document.getElementById('modalBg').classList.remove('show');
};

window.doDelete = async function() {
  closeModal();
  try {
    if (pendingDeleteType === 'key' && pendingDeleteKey) {
      await remove(ref(db, 'photos/' + pendingDeleteKey));
      photos = photos.filter(p => p.key !== pendingDeleteKey);
      showToast('🗑 写真を削除しました');
    } else if (pendingDeleteType === 'all') {
      await remove(ref(db, 'photos'));
      photos = [];
      showToast('🗑 全ての写真を削除しました');
    }
    countEl.textContent = photos.length + '枚';
    if (photos.length === 0) {
      stopSlide();
      wallEl.classList.remove('on'); slidesEl.classList.remove('on');
      wallEl.innerHTML = '';
      waitEl.style.display = 'flex';
    } else {
      if (slideIdx >= photos.length) slideIdx = photos.length - 1;
      if (mode === 'wall') {
        wallEl.innerHTML = '';
        photos.slice(-24).reverse().forEach(p => addWallItem(p, false));
      } else {
        showSlide(slideIdx);
      }
    }
  } catch(e) {
    showToast('❌ 削除エラー: ' + e.message);
  }
};

// ===== トースト =====
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3000);
}
</script>
